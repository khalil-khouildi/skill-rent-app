<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Skill Rent - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "on-background": "#191c23",

                        "on-surface": "#191c23",
                        "primary": "#005bbf",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#004493",
                        "primary-fixed-dim": "#adc7ff",
                        "on-secondary": "#ffffff",
                        "inverse-on-surface": "#eff0fa",
                        "inverse-surface": "#2d3038",
                        "tertiary-fixed": "#ffdbcb",
                        "on-secondary-fixed-variant": "#832600",
                        "on-primary-fixed": "#001a41",
                        "on-tertiary-fixed": "#341100",
                        "on-tertiary-container": "#0e0200",
                        "outline": "#727785",
                        "surface-tint": "#005bc0",
                        "error": "#ba1a1a",
                        "on-primary-container": "#ffffff",
                        "surface-container-low": "#f2f3fd",
                        "surface": "#f9f9ff",

                        "on-surface-variant": "#414754",
                        "secondary-fixed": "#ffdbd0",

                    },
                    "borderRadius": {

                    "spacing": {

                        "lg": "24px",
                        "md": "16px",

                        "xs": "8px",
                        "container-max": "1280px",
                        "sm": "12px"
                    },
                    "fontFamily": {
                        "body-md": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "h3": ["Inter"],

                    "fontSize": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-lg font-body-md text-body-md">
<!-- Top App Bar (Modified for transactional screen - hidden on mobile, simplified on desktop if present at all, but user requested consistent branding, so we'll just have a logo in the container) -->
<!-- Navigation shell suppressed for Login -->
<main class="w-full max-w-md mx-auto">
<!-- Branding Header -->
<div class="text-center mb-xl">
<h1 class="font-h1 text-h1 text-primary tracking-tighter">Skill Rent</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-xs">Welcome back! Please enter your details.</p>
</div>
<!-- Sign In Card -->
<div class="bg-surface-container-lowest rounded-xl p-lg shadow-[0_4px_20px_rgba(0,0,0,0.05)] border border-surface-variant">
<form action="#" class="space-y-md" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">mail</span>
</div>
<input class="block w-full pl-xl py-sm bg-surface-container-low border-none rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors font-body-md text-body-md placeholder:text-on-surface-variant" id="email" name="email" placeholder="Enter your email" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg">lock</span>
</div>
<input class="block w-full pl-xl pr-xl py-sm bg-surface-container-low border-none rounded-lg text-on-surface focus:ring-2 focus:ring-primary focus:bg-surface-container-lowest transition-colors font-body-md text-body-md placeholder:text-on-surface-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-xs">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot password?</a>
</div>
</div>
<!-- Primary Sign In Button -->
<button class="w-full flex justify-center items-center py-sm px-lg bg-primary-container text-on-primary-container rounded-lg font-label-md text-label-md hover:bg-primary transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary shadow-sm mt-lg" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative my-lg">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-sm bg-surface-container-lowest text-on-surface-variant font-label-sm text-label-sm">Or sign in with</span>
</div>
</div>
<!-- Social Sign In -->
<button class="w-full flex justify-center items-center py-sm px-lg bg-surface-container-lowest text-on-surface border border-surface-variant rounded-lg font-label-md text-label-md hover:bg-surface-container-low transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-outline shadow-sm" type="button">
<!-- Inline SVG for Google Logo -->
<svg class="w-5 h-5 mr-sm" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Google
            </button>
</div>
<!-- Footer Link -->
<p class="text-center mt-lg font-body-md text-body-md text-on-surface-variant">
            Don't have an account? 
            <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Sign Up</a>
</p>
</main>
</body></html>
